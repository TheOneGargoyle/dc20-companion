# Build and publish the DC20 Companion to GitHub Pages.
#
# Replaces the old manual publish ritual (build in /tmp, clone with a PAT from
# publish-token.txt, copy index.html, push). On any push that touches the build
# source, this Action runs companion-src/build.py and deploys the player-safe
# build to Pages. It authenticates with the built-in GITHUB_TOKEN, so no PAT.
#
# PREREQUISITES (one-time, see companion-src/DEPLOY.md):
#   1. The build source lives in this repo: companion-src/ and rules/.
#      The GM files (03/04/05/06/09_*_GM.md, _SESSION_LOG.md) are deliberately
#      NOT in the repo; build.py skips them gracefully and the player build
#      embeds no GM data, so nothing private ships to the public site.
#   2. Repo Settings > Pages > "Build and deployment" > Source = "GitHub Actions"
#      (switch away from "Deploy from a branch").
#
# The published output is companion-src/build.py's player edition
# (assemble(gm=False)) written to dist/index.html, PLUS the character builder
# (builds/builder.html, copied verbatim) at the static URL <site>/builder.html.
# The builder is fully self-contained (engine + catalog + ledgers baked in);
# its fetch()-first source loading simply falls back to the bake on Pages,
# and tools/builder_build.py regenerates it whenever its sources change (the
# harness sha-checks the bake against the sources, so it cannot drift).

name: Deploy Companion

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the build changes.
    paths:
      - "companion-src/**"
      - "rules/**"
      - "builds/**"          # party stats bake + the published builder page
      - ".github/workflows/deploy.yml"
  workflow_dispatch:          # allow a manual run from the Actions tab

# Least-privilege token: read the repo, write Pages, mint the deploy OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependency
        run: pip install markdown pyyaml

      - name: Build the player Companion
        run: python3 companion-src/build.py dist/index.html

      - name: Publish the character builder alongside it
        run: cp builds/builder.html dist/builder.html

      - name: Guard - output is complete and player-safe
        run: |
          set -e
          test -f dist/index.html
          tail -c 30 dist/index.html | grep -q "</html>" \
            || { echo "::error::build output does not end in </html> (truncated build)"; exit 1; }
          # No GM data must ever reach the public site.
          if grep -qE "Withdrawn|puppets|Returner|metaplot" dist/index.html; then
            echo "::error::GM strings found in player build - aborting deploy"; exit 1
          fi
          # No map imagery (Games Workshop material is not open-licensed).
          if grep -q "data:image/jpeg;base64" dist/index.html; then
            echo "::error::embedded image data found in player build - aborting deploy"; exit 1
          fi
          # Builder page: present, complete, and free of the same GM strings.
          test -f dist/builder.html
          tail -c 30 dist/builder.html | grep -q "</html>" \
            || { echo "::error::builder.html does not end in </html> (truncated)"; exit 1; }
          if grep -qE "Withdrawn|puppets|Returner|metaplot" dist/builder.html; then
            echo "::error::GM strings found in builder page - aborting deploy"; exit 1
          fi
          echo "Guards passed: $(du -h dist/index.html | cut -f1) companion + $(du -h dist/builder.html | cut -f1) builder, both end in </html>, no GM/map leak."

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

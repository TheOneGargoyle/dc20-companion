# CURATED - hand-maintained. Per-character single-target damage add-ons for the
# Companion Damage Calculator (FR-25 v1). Verified by tools/catalog_verify.py against
# the six build ledgers/files (08-16) and rules/*.md.
#
# MODEL. Two parts:
#   defs        - a reusable library of add-on definitions (an id -> a widget spec).
#   characters  - per-character assignment (base damage + which add-ons apply). Damage
#                 add-ons are genuinely per-character (they come from items, spells and
#                 subclass picks), so the two Spellblades differ - this is why the file is
#                 keyed by character handle, not by class like stamina_regen.yaml.
#
# WIDGET TYPES.
#   toggle   - a fixed +amount, on/off.
#   stepper  - +per each, count 0..cap. cap is an integer, or cap_stat: sp|mp to cap at
#              the character's max SP/MP (resolved at render time in the Companion).
#
# SCOPE (v1). Single-hit total only: base + hit-grade + crit + additive single-target
# riders. OUT of v1 (a possible v2): AoE / per-target / N-targets math (Whirlwind,
# Fireball/Breath area, Chain), target Damage Reduction, and ruling-dependent engines
# (Rolling Wild Fire). Accuracy-only riders (Call of the Grave, Hasty Bargain) are NOT
# damage and are excluded by design.
catalog_version: 1
ruleset: DC20 0.10.5
source: rules/core-rules.md l.2376 (Adding Damage Order) + rules/combat.md l.1807 (MP on AP Enhancements) + build files 08-16

# --- Reusable add-on definitions ------------------------------------------------------
# The DC20 "Adding Damage Order" puts AP-spent bonuses before situational ones; the
# calculator lists them in the character's assignment order, which follows that spirit.
defs:
  smite:
    label: "Smite"
    type: stepper
    per: 2            # 1 SP = +2 (Smite bundles a free Damage enhancement); Bound Weapon
    cap_stat: sp
    unit: SP
    note: "single target; 1 SP = +2 dmg (bundled free Damage enhancement)"
  mp_to_damage:
    label: "MP to damage"
    type: stepper
    per: 2            # 1 MP = 2 AP-worth of Damage enhancements = +2 (combat.md l.1807)
    cap: 2           # Mana Spend Limit at L4 (rises to 3 at L5); the party is L4
    unit: MP
    note: "spell portion; cap = Mana Spend Limit (2 at L4, 3 at L5)"
  gen_damage:
    label: "Damage enhancement"
    type: stepper
    per: 1
    cap: 3
    unit: AP/SP
    note: "single target; +1 per AP or SP spent"
  powerful:
    label: "Powerful focus"
    type: toggle
    amount: 1
    note: "+1 to spell damage (passive; applies through Spellstrike)"
  rage:
    label: "Rage"
    type: toggle
    amount: 1
    note: "+1 melee damage while Raging"
  deaths_toll:
    label: "Death's Toll"
    type: toggle
    amount: 1
    note: "+1 vs Bloodied targets (Radiant Bolt pact rider)"
  erupting:
    label: "Erupting Elements"
    type: toggle
    amount: 1
    note: "+1 Fire while Raging and the target is in your aura"
  battlefield:
    label: "Battlefield Tactics"
    type: toggle
    amount: 1
    note: "+1 on your first melee attack vs a Flanked target"
  imbue:
    label: "Imbued strike"
    type: toggle
    amount: 1
    note: "+1 per martial hit (not on spell bolts); 1-min buff"

# --- Per-character assignment (L4) -----------------------------------------------------
# base      = the Damage Calculator's default Base Damage (editable per hit).
# base_note = shown beside the base stepper.
# addons    = ordered list; an id from defs, or {id, ...overrides} (e.g. imbue's type/label).
characters:
  tan:
    base: 2
    base_note: "Greatsword of the Keepers (swap to 1 for Radiant Bolt)"
    addons: [smite, powerful, mp_to_damage, deaths_toll]
  xan:
    base: 1
    base_note: "Light Short Sword (Death Bolt folds in via Spellstrike)"
    addons:
      - smite
      - {id: imbue, label: "Umbral Imbued"}
      - mp_to_damage
  runt:
    base: 1
    base_note: "Lightning Bolt (staff swings are minor)"
    addons:
      - mp_to_damage
      - {id: imbue, label: "Lightning Imbued", note: "+1 per MARTIAL hit (slams/staff), not on bolts"}
  min:
    base: 1
    base_note: "Crossbow (his real value is granting allies attacks, not a big own-hit)"
    addons: [gen_damage, battlefield]
  bonan:
    base: 2
    base_note: "Mace (shown un-Raged; toggle Rage below)"
    addons: [rage, gen_damage, erupting]
  scale:
    base: 1
    base_note: "Fire Bolt (AoE Fireball/Breath are a v2 item)"
    addons: [mp_to_damage, powerful]

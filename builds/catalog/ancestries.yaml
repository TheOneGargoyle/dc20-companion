# CURATED cross-cutting cost list — ancestry-trait point costs.
# Source: rules/ancestries.md (Human l.329-352, Elf l.354-383, Dwarf l.385-417, Halfling
# l.418-453, Dragonborn l.522-597, Giantborn l.598-634, Angelborn l.635-693, Fiendborn
# l.694-763, Beastborn l.764-973 incl. the Beast Traits list). Costs are the (N) prefix on
# each trait line; negative = drawback that refunds points. tools/catalog_verify.py re-parses
# ancestries.md and asserts every cost below matches the source.
#
# Scope (validate-don't-enumerate): the ancestries the six walked builds touch.
#   Tanrielle  Half-elf            -> Human + Elf
#   Runt       Giantborn / Dwarf   -> Giantborn + Dwarf
#   Minimus    Halfling Kitsune    -> Halfling + Beastborn (ledger source name: Beast)
#   Bonan      Halfling Beastborn  -> Halfling + Beastborn
#   Scaletrix  Redemption Fiendborn + Dragonborn -> Fiendborn + Dragonborn (+ Angelborn via
#              the Redeemed trait: "you can now spend your Ancestry Points on Angelborn Traits")
#   Xanwyn     Elvan (Elf + Beast) -> Elf + Beastborn
#
# source_aliases: ledger `source:` names that map onto a curated list here.
# aliases on a trait: ledger names for the same rules-text trait (e.g. Scaletrix's "Arcane
# Spell" is the Fiendborn trait the rules call "Fiendish Magic": learn 1 Arcane spell).

catalog_version: 1
source_aliases: {Beast: Beastborn}
ancestries:

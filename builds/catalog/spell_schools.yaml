# CURATED cross-cutting cost list — spell-school membership for the SCHOOLS-model classes.
# Source: rules/spells.md "Spells sorted by Schools" section (l.332-519). Two of the walked
# classes draw magic from Spell Schools: the Spellblade ("Choose 2 Spell Schools",
# classes.md l.2834, plus Weapon/Ward tag access) and the Warlock ("Choose 3 Spell Schools",
# classes.md l.3204, no tag access). For schools-model classes the school-flattened list is
# the right source — NO magic-source tracking is needed (the SS11 wrinkle only bites
# source-drawing classes like the Druid; see spell_sources.yaml). tools/catalog_verify.py
# re-parses that section and asserts these lists match the source.
#
# Access rule (Spellblade): a Spell is a legal pick if it is in one of the character's CHOSEN
# schools OR carries a tag in tag_access. (Primal Hide is School: Transmutation but Tags:
# Embolden, Ward — legal for Tanrielle via the Ward tag, spells.md l.6628-6631.)
# Access rule (Warlock): chosen schools only, plus any subclass spell_access grant (Eldritch
# Psychic Spellcasting: Psychic-tag spells, see warlock.yaml subclass_grants).
#
# Scope (validate-don't-enumerate): only the schools the walked builds touch.
#   Tanrielle: Invocation + Divination.  Xanwyn: Nullification + Invocation (+ Transmutation
#   via the Spell School Initiate talent).  Runt: Elemental + Invocation + Nullification.
# Add schools as builds reach them.


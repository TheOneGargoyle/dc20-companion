# CURATED cross-cutting cost list — spell-SOURCE membership for the source-drawing classes.
# Source: rules/spells.md "Spells sorted by Sources" section (l.7-331). "Certain classes
# (such as the Cleric, Druid, Sorcerer, or Wizard) draw their magic from a Spell Source."
# The Druid is the walked one: "When you learn a new Spell, you can choose any Spell on the
# Primal Spell Source" (classes.md l.1315-16).
#
# THIS file is where the RUNG3_PLAN SS11 wrinkle lives: school names repeat across the three
# magic sources (Arcane / Divine / Primal), so membership is tracked under the PARENT SOURCE
# heading, source -> school -> spells, exactly mirroring the md structure. (The schools-model
# classes — Spellblade, Warlock — use the flattened spell_schools.yaml instead and need no
# source tracking.) tools/catalog_verify.py re-parses the by-Sources section tracking the
# parent source headings and asserts these lists match.
#
# Scope (validate-don't-enumerate): only the sources the walked builds draw from. Scaletrix
# (Druid) walks Primal. Add Arcane/Divine blocks when a Cleric/Sorcerer/Wizard ledger arrives.


# Sorcerer 'Meta Magic' Multiclass feature (Adept MC), so it lives at catalog level (like
# spell_schools / maneuvers / talents), NOT inside a single class file. FR-8 slice 4.
# Source: rules/classes.md l.2618-2639 - Sorcerer Level 2 'Meta Magic': "You gain 2 unique
# Spell Enhancements from the list below." Six options; NONE confer a resource delta (each is a

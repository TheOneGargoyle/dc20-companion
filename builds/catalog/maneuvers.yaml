# grants supply the slots; the engine validates the counts), so this list is names + type
# only: it is the legality list the engine did not have, and the option list the builder's
# picker offers. tools/catalog_verify.py asserts every name below appears as a Maneuver
# heading in combat.md (transcription-drift check).

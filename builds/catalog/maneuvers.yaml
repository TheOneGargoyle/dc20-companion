# CURATED cross-cutting cost list — the Maneuver name list.
# Source: rules/combat.md "Maneuvers" chapter (Attack l.972+, Defense l.1225+, Grapple
# l.1376+, Utility l.1471+). All Maneuvers cost 1 to learn (class table / Martial path /
# grants supply the slots; the engine validates the counts), so this list is names + type
# only: it is the legality list the engine did not have, and the option list the builder's
# picker offers. tools/catalog_verify.py asserts every name below appears as a Maneuver
# heading in combat.md (transcription-drift check).
#
# NOTE: "Recovery" is not a 0.10.5 maneuver and is deliberately absent. Bonan's sheet showed
# "Recovery" which turned out to be a typo for the real Utility maneuver "Recover" (below);
# his ledger was corrected 2026-07-12. Any stray "Recovery" is still an error, not a name.

catalog_version: 1
maneuvers:
  Attack:
    - Heroic Bash
    - Savage Strike
    - Sunder Strike
    - Swift Strike
    - Meteor Strike
    - Cleave
    - Whirlwind
    - Pathcarver
    - Piercing Shot
    - Scattershot
    - Volley
  Defense:
    - Parry
    - Brace
    - Side Step
    - Protect
    - Endure
    - Resolve
    - Swap
  Grapple:
    - Slam
    - Restrain
    - Body Block
    - Throw Creature
  Utility:
    - Recover
    - Heroic Pass Through
    - Line Run
    - Reposition
    - Heroic Taunt
    - Heroic Intimidate
    - Heroic Shove
    - Heroic Extend Jump
